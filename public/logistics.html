<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logistics | TesArt Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">⚙ TesArt Management System</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>

    <div class="container-fluid mt-4 px-4">
        <h3 class="page-title border-bottom pb-2 mb-4">Delivery & Pickup Schedule</h3>

        <div class="card p-3 mb-4 shadow-sm border-start border-warning border-4">
            <h5>Schedule New Movement</h5>
            <div class="row g-2 align-items-center">
                <div class="col-md-3">
                    <select id="logOrderSelect" class="form-select"><option value="">-- Order --</option></select>
                </div>
                <div class="col-md-2">
                    <select id="logType" class="form-select">
                        <option value="Pickup">Pickup</option>
                        <option value="Delivery">Delivery</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="date" id="logDate" class="form-control">
                </div>
                <div class="col-md-2">
                    <select id="logStatus" class="form-select">
                        <option value="Pending">Pending</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="scheduleBtn" class="btn btn-warning w-100 fw-bold">Schedule</button>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th><th>ORDER</th><th>CUSTOMER</th><th>METHOD</th><th>DATE</th><th>STATUS</th><th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="logisticsTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="logistics.js"></script>
</body>
</html>
