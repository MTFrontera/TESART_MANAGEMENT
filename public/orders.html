<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <title>Orders | TesartMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">&#9881; TesartMS</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>

    <div class="container-fluid mt-4 px-4">
        <h3 class="page-title border-bottom pb-2 mb-4">Order Management</h3>

        <div class="card p-3 mb-4 shadow-sm">
            <h5>Create New Order Entry</h5>
            <div class="row g-2 mt-2">
                <div class="col-md-3">
                    <select id="selectCustomer" class="form-select"><option>-- Customer --</option></select>
                </div>
                <div class="col-md-3">
                    <select id="selectEmployee" class="form-select"><option>-- Employee --</option></select>
                </div>
                <div class="col-md-2">
                    <input type="date" id="orderDate" class="form-control">
                </div>
                <div class="col-md-2">
                    <select id="orderStatus" class="form-select">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="createOrderBtn" class="btn btn-custom w-100">Create Order</button>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr>
                        <th>ORDER ID</th><th>CUSTOMER</th><th>HANDLED BY</th><th>DATE</th><th>STATUS</th><th>TOTAL</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="navbar-active.js"></script>
    <script src="orders.js"></script>
</body>
</html>
