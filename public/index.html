<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <title>Dashboard | TesartMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .stat-card { border-radius: 15px; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">&#9881; TesartMS</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>

    <div class="container mt-5">
        <h2 class="mb-4 text-dark">Welcome back, Admin</h2>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card stat-card bg-primary text-white p-4 shadow border-0">
                    <h6 class="opacity-75">Total Revenue</h6>
                    <h2 id="statRevenue" class="fw-bold">₱0.00</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card bg-success text-white p-4 shadow border-0">
                    <h6 class="opacity-75">Active Customers</h6>
                    <h2 id="statCustomers" class="fw-bold">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card bg-danger text-white p-4 shadow border-0">
                    <h6 class="opacity-75">Low Stock Alerts</h6>
                    <h2 id="statStock" class="fw-bold">0</h2>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h4 class="text-secondary mb-3">Quick Actions</h4>
            <div class="d-flex gap-2 flex-wrap">
                <a href="index.html" class="btn btn-dark px-4">New Sale</a>
                <a href="inventory.html" class="btn btn-outline-dark px-4">Update Stock</a>
                <a href="reports.html" class="btn btn-outline-dark px-4">View Reports</a>
                <a href="logistics.html" class="btn btn-outline-primary px-4">Check Deliveries</a>
            </div>
        </div>
    </div>

    <script src="navbar-active.js"></script>
    <script src="index.js"></script>
</body>
</html>
