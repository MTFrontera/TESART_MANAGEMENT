<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory | TesartMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">⚙ TesartMS</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html" class="active">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>

    <div class="container-fluid mt-4 px-4">
        <h3 class="page-title border-bottom pb-2 mb-4">Stock Levels</h3>

        <div class="card p-3 mb-4 shadow-sm border-start border-info border-4">
            <h5>Update Stock Level</h5>
            <div class="row g-2 align-items-center">
                <div class="col-md-4">
                    <select id="invProductSelect" class="form-select"><option value="">-- Select Product to Track --</option></select>
                </div>
                <div class="col-md-3">
                    <input type="number" id="invQty" class="form-control" placeholder="Current Quantity">
                </div>
                <div class="col-md-2">
                    <button id="invAddBtn" class="btn btn-custom w-100">Start Tracking</button>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>INV ID</th><th>PRODUCT</th><th>STOCK QTY</th><th>LAST UPDATED</th><th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="navbar-active.js"></script>
    <script src="inventory.js"></script>
</body>
