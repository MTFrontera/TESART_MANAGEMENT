<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products | TesartMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">⚙ TesartMS</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>

    <div class="container-fluid mt-4 px-4">
        <h3 class="page-title border-bottom pb-2 mb-4">Product Inventory</h3>

        <div class="card p-3 mb-4 shadow-sm">
            <h5 id="formTitle">Add New Product</h5>
            <input type="hidden" id="editProductId"> <div class="row g-2 align-items-center">
                <div class="col-md-3">
                    <input type="text" id="prodName" class="form-control" placeholder="Product Name">
                </div>
                <div class="col-md-3">
                    <input type="text" id="prodDesc" class="form-control" placeholder="Description">
                </div>
                <div class="col-md-2">
                    <input type="number" id="prodPrice" class="form-control" placeholder="Price">
                </div>
                <div class="col-md-2">
                    <select id="prodCategory" class="form-select">
                        <option value="Printing">Printing</option>
                        <option value="Design">Design</option>
                        <option value="Merchandise">Merchandise</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="submitBtn" class="btn btn-custom w-100">Save Product</button>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr>
                        <th>ID</th><th>PRODUCT NAME</th><th>DESCRIPTION</th><th>PRICE</th><th>CATEGORY</th><th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="productTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="navbar-active.js"></script>
    <script src="products.js"></script>
</body>
</html>
