<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TesartMS - Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">⚙ TesartMS</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html" class="active">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>
    <div class="container-fluid mt-4 px-4">
        <h3 class="page-title border-bottom pb-2 mb-4">Order Details (Sales)</h3>

        <div class="card p-3 mb-4 shadow-sm add-form-card">
            <div class="row g-2 align-items-center">
                <div class="col-md-2">
                    <select id="orderSelect" class="form-select">
                        <option selected disabled>-- Order ID --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="productSelect" class="form-select">
                        <option selected disabled>-- Product --</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="number" id="qtyInput" class="form-control" placeholder="Qty" value="1" min="1">
                </div>
                <div class="col-md-2">
                    <input type="number" id="priceInput" class="form-control" placeholder="Unit Price" readonly>
                </div>
                <div class="col-md-3">
                    <button id="addDetailBtn" class="btn btn-custom w-100">Add Order Detail</button>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr>
                        <th>DETAIL ID</th>
                        <th>ORDER ID</th>
                        <th>DATE</th>
                        <th>PRODUCT</th>
                        <th>QTY</th>
                        <th>UNIT PRICE</th>
                        <th>SUBTOTAL</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="navbar-active.js"></script>
    <script src="order-details-v2.js"></script>
</body>
</html>
