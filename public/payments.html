<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payments | TesartMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar custom-navbar">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">⚙ TesartMS</span>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="customers.html">Customers</a>
            <a href="employees.html">Employees</a>
            <a href="products.html">Products</a>
            <a href="orders.html">Orders</a>
            <a href="order-details.html">Order Details</a>
            <a href="payments.html">Payments</a>
            <a href="inventory.html">Inventory</a>
            <a href="logistics.html">Logistics</a>
            <a href="reports.html">Reports</a>
        </div>
    </div>
</nav>

    <div class="container-fluid mt-4 px-4">
        <h3 class="page-title border-bottom pb-2 mb-4">Transaction History</h3>

        <div class="card p-3 mb-4 shadow-sm border-start border-success border-4">
            <h5>Record New Payment</h5>
            <div class="row g-2 align-items-center">
                <div class="col-md-2">
                    <select id="payOrderSelect" class="form-select"><option value="">-- Order ID --</option></select>
                </div>
                <div class="col-md-3">
                    <select id="payMethod" class="form-select">
                        <option value="Cash">Cash</option>
                        <option value="GCash">GCash</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" id="payAmount" class="form-control" placeholder="Amount Paid (₱)">
                </div>
                <div class="col-md-2">
                    <select id="payStatus" class="form-select">
                        <option value="Full">Full Payment</option>
                        <option value="Partial">Downpayment</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="paySubmitBtn" class="btn btn-success w-100">Post Payment</button>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>PAY ID</th><th>ORDER</th><th>CUSTOMER</th><th>DATE</th><th>METHOD</th><th>AMOUNT</th><th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="navbar-active.js"></script>
    <script src="payments.js"></script>
</body>
</html>
